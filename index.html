<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון | מבוא להגנת סייבר ואבטחת מידע</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Sans+Hebrew:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Noto Sans Hebrew', 'Inter', system-ui, sans-serif;
        }
        
        .question-card {
            background: #0f172a;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
            border-color: #64748b;
        }
        
        .option-btn:active:not(:disabled) {
            transform: scale(0.985);
        }
        
        .option-btn.correct {
            background-color: #166534 !important;
            border-color: #4ade80 !important;
            color: white;
        }
        
        .option-btn.incorrect {
            background-color: #991b1b !important;
            border-color: #f87171 !important;
            color: white;
        }
        
        .nav-btn {
            transition: all 0.2s ease;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s ease;
        }
        
        .quiz-container {
            max-width: 720px;
            margin: 0 auto;
        }
        
        .section-header {
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .answer-letter {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-weight: 700;
        }
        
        .mobile-friendly {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 mobile-friendly">
    <div class="quiz-container min-h-screen px-4 py-6 flex flex-col">
        
        <!-- Header -->

                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tighter">חידון סייבר</h1>

                </div>
            </div>
            <div class="text-right">
                <div class="inline-flex items-center gap-x-1.5 bg-slate-900 border border-slate-700 rounded-2xl px-3 py-1">

                    <span class="text-xs font-semibold text-emerald-400">120+ שאלות</span>

            </div>
        </div>

        <!-- START SCREEN -->
        <div id="start-screen" class="flex-1 flex flex-col items-center justify-center text-center">
            <div class="max-w-md w-full">
                <div class="mb-8">

                    </div>
                    <h2 class="text-4xl font-extrabold tracking-tighter mb-3">בדוק את הידע שלך</h2>
                    <p class="text-xl text-slate-400 leading-tight">חידון אינטראקטיבי מקיף<br>המבוסס על סיכום הקורס המלא</p>
                </div>

                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5 mb-6 text-sm">
                    <div class="grid grid-cols-3 gap-4 text-center">
                        <div>
                            <div class="text-2xl font-bold text-emerald-400">120+</div>
                            <div class="text-xs text-slate-500 mt-0.5">שאלות</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-cyan-400">12</div>
                            <div class="text-xs text-slate-500 mt-0.5">נושאים</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-amber-400">100%</div>
                            <div class="text-xs text-slate-500 mt-0.5">כיסוי</div>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <button onclick="startQuiz(false)"
                            class="w-full group flex items-center justify-center gap-x-3 bg-white hover:bg-slate-100 active:bg-slate-200 transition-all text-slate-900 font-extrabold py-4 px-8 rounded-3xl text-lg shadow-xl">
                        <span>התחל חידון מלא</span>
                        <i class="fa-solid fa-play ml-1 group-active:scale-90 transition-transform"></i>
                    </button>
                    
                    <button onclick="startQuiz(true)"
                            class="w-full flex items-center justify-center gap-x-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 transition-colors border border-slate-600 font-semibold py-3.5 px-6 rounded-3xl text-base">
                        <i class="fa-solid fa-random"></i>
                        <span>גרסה אקראית (50 שאלות)</span>
                    </button>
                </div>
                
                <p class="mt-6 text-[10px] text-slate-500">מותאם לטלפון נייד • ניתן לחזור על שאלות • משוב מיידי</p>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden flex-1 flex flex-col">
            
            <!-- Top bar -->
            <div class="flex items-center justify-between mb-4 px-1">
                <div>
                    <span class="section-header text-cyan-400">שאלה</span>
                    <span id="q-number-top" class="font-mono text-2xl font-bold tabular-nums ml-1.5">01</span>
                    <span class="text-slate-500">/ <span id="total-q-top">120</span></span>
                </div>
                <div class="flex items-center gap-x-2 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-1">
                    <i class="fa-solid fa-tachometer-alt text-emerald-400"></i>
                    <span id="score-top" class="font-mono font-semibold tabular-nums">0/120</span>
                </div>
            </div>
            
            <!-- Progress -->

                </div>
            </div>

            <!-- Question Card -->
            <div class="question-card flex-1 rounded-3xl p-6 mb-5 border border-slate-700">

                        01
                    </div>
                    <div class="flex-1 pt-1">
                        <div id="question-text" 
                             class="text-[17px] leading-snug font-semibold text-white tracking-[-0.2px]">
                        </div>
                    </div>
                </div>
                
                <!-- Options -->
                <div id="options-container" class="mt-7 space-y-2.5">

                </div>
            </div>

            <!-- Feedback -->

                    <div id="feedback-text" class="flex-1 leading-snug"></div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex gap-3 px-1">
                <button onclick="prevQuestion()" id="prev-btn"
                        class="nav-btn flex-1 flex items-center justify-center gap-x-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 disabled:opacity-40 disabled:cursor-not-allowed py-[13px] rounded-2xl font-semibold text-sm active:scale-[0.985]">
                    <i class="fa-solid fa-arrow-right"></i>
                    <span>הקודם</span>
                </button>
                <button onclick="nextQuestion()" id="next-btn"

                    <span id="next-btn-text">הבא</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="hidden flex-1 flex flex-col items-center justify-center text-center px-4">
            <div class="w-28 h-28 bg-gradient-to-br from-emerald-500 to-cyan-600 rounded-full flex items-center justify-center mb-7 shadow-2xl">
                <i class="fa-solid fa-trophy text-white text-6xl"></i>
            </div>
            
            <h2 class="text-3xl font-extrabold tracking-tight mb-1">סיימת את החידון!</h2>
            
            <div id="final-percentage"

            </div>
            
            <div class="text-xl text-slate-300 mb-6">

            </div>
            
            <div id="performance-badge"
                 class="inline-flex items-center gap-x-2 bg-slate-900 border border-slate-700 rounded-3xl px-5 py-2 mb-8">
                <span id="performance-text" class="font-semibold text-sm"></span>
            </div>
            
            <div class="w-full max-w-xs space-y-3">
                <button onclick="restartQuiz()"
                        class="w-full flex items-center justify-center gap-x-2 bg-white text-slate-900 font-extrabold py-3.5 rounded-3xl active:bg-slate-100 transition-colors">
                    <i class="fa-solid fa-redo"></i>
                    <span>נסה שוב</span>
                </button>
                
                <button onclick="reviewWrongAnswers()"
                        class="w-full flex items-center justify-center gap-x-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 font-semibold py-3.5 rounded-3xl transition-colors">
                    <i class="fa-solid fa-list-check"></i>
                    <span>סקור תשובות שגויות</span>
                </button>
                
                <button onclick="goToStart()"
                        class="text-xs text-slate-400 hover:text-slate-300 py-2 flex items-center justify-center gap-x-1.5">
                    <i class="fa-solid fa-home"></i>
                    <span>חזור למסך הפתיחה</span>
                </button>
            </div>
        </div>
        
    </div>

    <script>

            userAnswers = new Array(currentQuestions.length).fill(null);
            isAnswered = false;
            
            updateHeader();
            showQuestion();
        }
        
        // Update header info
        function updateHeader() {
            document.getElementById('total-q-top').innerText = currentQuestions.length;
            document.getElementById('score-top').innerText = `${score}/${currentQuestions.length}`;
        }
        
        // Update progress bar and counters
        function updateProgress() {
            const progressPercent = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            
            document.getElementById('q-number-top').innerText = String(currentIndex + 1).padStart(2, '0');
            document.getElementById('score-top').innerText = `${score}/${currentQuestions.length}`;
            
            // Update badge
            document.getElementById('q-badge').innerText = String(currentIndex + 1).padStart(2, '0');
        }
        
        // Display current question
        function showQuestion() {
            const q = currentQuestions[currentIndex];
            isAnswered = false;
            
            // Question text
            document.getElementById('question-text').innerHTML = q.question;
            
            // Options
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((optionText, index) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full text-right p-4 pr-5 rounded-2xl border border-slate-600 bg-slate-800 hover:bg-slate-700 text-[15px] leading-snug font-medium flex items-start gap-3 active:scale-[0.985]`;
                
                const letter = String.fromCharCode(1488 + index); // Hebrew letters א, ב, ג, ד
                
                btn.innerHTML = `
                    <span class="answer-letter shrink-0 w-6 h-6 flex items-center justify-center bg-slate-700 text-cyan-400 rounded-xl text-xs font-extrabold mt-0.5">${letter}</span>
                    <span class="flex-1 pt-0.5">${optionText}</span>
                `;
                
                btn.onclick = () => handleAnswerSelection(index, btn);
                container.appendChild(btn);
            });
            
            // Reset feedback
            document.getElementById('feedback-area').classList.add('hidden');
            
            // Navigation buttons
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            
            const nextBtn = document.getElementById('next-btn');
            const nextText = document.getElementById('next-btn-text');
            
            if (currentIndex === currentQuestions.length - 1) {
                nextText.innerText = 'סיים חידון';
                nextBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-700', 'text-white');
                nextBtn.classList.remove('bg-white', 'text-slate-900');
            } else {
                nextText.innerText = 'הבא';
                nextBtn.classList.remove('bg-emerald-600', 'hover:bg-emerald-700', 'text-white');
                nextBtn.classList.add('bg-white', 'text-slate-900');
            }
            
            updateProgress();
        }
        
        // Handle answer selection
        function handleAnswerSelection(selectedIndex, selectedBtn) {
            if (isAnswered) return;
            isAnswered = true;
            
            const q = currentQuestions[currentIndex];
            const isCorrect = selectedIndex === q.correct;
            
            // Disable all option buttons
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach((btn, idx) => {
                btn.disabled = true;
                
                if (idx === q.correct) {
                    // Correct answer
                    btn.classList.add('correct');
                    btn.innerHTML = btn.innerHTML.replace('bg-slate-700', 'bg-emerald-600');
                    btn.innerHTML = btn.innerHTML.replace('text-cyan-400', 'text-white');
                } else if (idx === selectedIndex && !isCorrect) {
                    // Wrong selected
                    btn.classList.add('incorrect');
                }
            });
            
            // Update score
            if (isCorrect) {
                score++;
                document.getElementById('score-top').innerText = `${score}/${currentQuestions.length}`;
            }
            
            // Store answer
            userAnswers[currentIndex] = selectedIndex;
            
            // Show feedback
            showFeedback(isCorrect, q.options[q.correct]);
        }
        
        // Show feedback after answering
        function showFeedback(isCorrect, correctAnswerText) {
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackText = document.getElementById('feedback-text');
            const feedbackIcon = document.getElementById('feedback-icon');
            
            feedbackArea.classList.remove('hidden');
            
            if (isCorrect) {
                feedbackBox.className = 'rounded-2xl px-5 py-3.5 text-sm border flex items-start gap-3 bg-emerald-950 border-emerald-800 text-emerald-300';
                feedbackIcon.className = 'fa-solid fa-check-circle text-emerald-400 text-xl mt-0.5';
                feedbackText.innerHTML = '<strong>תשובה נכונה!</strong> כל הכבוד, המשך כך!';
            } else {
                feedbackBox.className = 'rounded-2xl px-5 py-3.5 text-sm border flex items-start gap-3 bg-red-950 border-red-800 text-red-300';
                feedbackIcon.className = 'fa-solid fa-times-circle text-red-400 text-xl mt-0.5';
                feedbackText.innerHTML = `<strong>תשובה שגויה.</strong> התשובה הנכונה: <span class="font-semibold">${correctAnswerText}</span>`;
            }
        }
        
        // Go to next question or end
        function nextQuestion() {
            if (!isAnswered && currentIndex < currentQuestions.length - 1) {
                userAnswers[currentIndex] = null;
            }
            
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                endQuiz();
            }
        }
        
        // Go to previous question
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
                
                if (userAnswers[currentIndex] !== null) {
                    const q = currentQuestions[currentIndex];
                    const selected = userAnswers[currentIndex];
                    const isCorrect = selected === q.correct;
                    
                    setTimeout(() => {
                        const allBtns = document.getElementById('options-container').querySelectorAll('button');
                        allBtns.forEach((btn, idx) => {
                            btn.disabled = true;
                            if (idx === q.correct) {
                                btn.classList.add('correct');
                            } else if (idx === selected && !isCorrect) {
                                btn.classList.add('incorrect');
                            }
                        });
                        
                        showFeedback(isCorrect, q.options[q.correct]);
                    }, 50);
                }
            }
        }
        
        // End the quiz and show results
        function endQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            const percentage = Math.round((score / currentQuestions.length) * 100);
            
            document.getElementById('final-percentage').innerText = `${percentage}%`;
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-total').innerText = currentQuestions.length;
            
            let perfText = '';
            let badgeClass = '';
            
            if (percentage >= 90) {
                perfText = 'ביצוע מצוין! אתה שולט בחומר באופן מלא 🏆';
                badgeClass = 'bg-emerald-900 border-emerald-700 text-emerald-300';
            } else if (percentage >= 75) {
                perfText = 'ביצוע טוב מאוד! יש לך בסיס חזק מאוד.';
                badgeClass = 'bg-teal-900 border-teal-700 text-teal-300';
            } else if (percentage >= 60) {
                perfText = 'ביצוע סביר. מומלץ לחזור על הנושאים החלשים.';
                badgeClass = 'bg-amber-900 border-amber-700 text-amber-300';
            } else {
                perfText = 'כדאי לחזור על הסיכום ולנסות שוב. אתה יכול להצליח!';
                badgeClass = 'bg-red-900 border-red-700 text-red-300';
            }
            
            const badge = document.getElementById('performance-badge');
            badge.className = `inline-flex items-center gap-x-2 rounded-3xl px-5 py-2 mb-8 ${badgeClass}`;
            document.getElementById('performance-text').innerText = perfText;
        }
        
        // Restart quiz
        function restartQuiz() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '0%';
        }
        
        // Go back to start from end screen
        function goToStart() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
        
        // Review wrong answers in a modal
        function reviewWrongAnswers() {
            const wrongOnes = [];
            
            for (let i = 0; i < currentQuestions.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] !== currentQuestions[i].correct) {
                    wrongOnes.push({
                        num: i + 1,
                        question: currentQuestions[i].question,
                        yourAnswer: currentQuestions[i].options[userAnswers[i]],
                        correctAnswer: currentQuestions[i].options[currentQuestions[i].correct]
                    });
                }
            }
            
            if (wrongOnes.length === 0) {
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-x-2 z-50';
                toast.innerHTML = `<i class="fa-solid fa-check-double"></i> <span>כל התשובות היו נכונות! כל הכבוד!</span>`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2800);
                return;
            }
            
            let modalHTML = `
                <div class="fixed inset-0 bg-black/80 flex items-end sm:items-center justify-center p-4 z-[100]" onclick="this.remove()">
                    <div onclick="event.stopImmediatePropagation()" class="bg-slate-900 w-full max-w-2xl max-h-[85vh] overflow-auto rounded-t-3xl sm:rounded-3xl border border-slate-700 p-5 sm:p-6">
                        <div class="flex items-center justify-between mb-5 sticky top-0 bg-slate-900 py-2">
                            <div>
                                <h3 class="text-xl font-extrabold">סקירת תשובות שגויות</h3>
                                <p class="text-xs text-slate-400">${wrongOnes.length} שאלות שגויות מתוך ${currentQuestions.length}</p>
                            </div>
                            <button onclick="this.closest('.fixed').remove()" class="text-3xl leading-none text-slate-400 hover:text-white px-3">×</button>
                        </div>
                        
                        <div class="space-y-4 pb-4">
            `;
            
            wrongOnes.forEach(item => {
                modalHTML += `
                    <div class="border border-red-900/60 bg-red-950/30 rounded-2xl p-4 text-sm">
                        <div class="flex items-center gap-x-2 mb-2">
                            <span class="font-mono text-xs bg-red-900/60 text-red-300 px-2.5 py-px rounded">שאלה ${item.num}</span>
                        </div>
                        <div class="font-medium mb-3 leading-snug">${item.question}</div>
                        
                        <div class="space-y-1.5 text-xs">
                            <div class="flex gap-2">
                                <span class="text-red-400 shrink-0">✗ התשובה שלך:</span> 
                                <span class="text-red-200">${item.yourAnswer}</span>
                            </div>
                            <div class="flex gap-2">
                                <span class="text-emerald-400 shrink-0">✓ התשובה הנכונה:</span> 
                                <span class="text-emerald-200 font-medium">${item.correctAnswer}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            modalHTML += `
                        </div>
                        
                        <div class="pt-3 border-t border-slate-700 flex justify-end">
                            <button onclick="this.closest('.fixed').remove()" 
                                    class="px-6 py-2 text-sm font-semibold bg-slate-700 hover:bg-slate-600 rounded-2xl">
                                סגור
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }
        
        // Keyboard support
        function setupKeyboardSupport() {
            document.addEventListener('keydown', function(e) {
                const quizScreen = document.getElementById('quiz-screen');
                if (quizScreen.classList.contains('hidden')) return;
                
                if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (e.key === 'ArrowRight') {
                        document.getElementById('next-btn').click();
                    } else {
                        document.getElementById('prev-btn').click();
                    }
                }
                
                if (!isAnswered && ['1','2','3','4'].includes(e.key)) {
                    const idx = parseInt(e.key) - 1;
                    const options = document.getElementById('options-container').querySelectorAll('button');
                    if (options[idx]) {
                        options[idx].click();
                    }
                }
            });
            
            console.log('%c[Cyber Quiz] Keyboard support enabled (arrows + 1-4 keys)', 'color:#475569');
        }
        
        // Initialize everything
        function initializeQuiz() {
            initTailwind();
            setupKeyboardSupport();
            document.getElementById('progress-bar').style.width = '0%';
            console.log('%c[Cyber Quiz] חידון מוכן! התשובות הנכונות ממוקמות באופן אקראי.', 'color:#64748b; font-size: 9px');
        }
        
        // Boot the application
        window.onload = initializeQuiz;
    </script>
</body>
</html>
