<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון | מבוא להגנת סייבר ואבטחת מידע</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Sans+Hebrew:wght@400;500;600&amp;display=swap');
        body { font-family: 'Noto Sans Hebrew', 'Inter', system-ui, sans-serif; }
        .question-card { background: #0f172a; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .option-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); border-color: #64748b; }
        .option-btn:active:not(:disabled) { transform: scale(0.985); }
        .option-btn.correct { background-color: #166534 !important; border-color: #4ade80 !important; color: white; }
        .option-btn.incorrect { background-color: #991b1b !important; border-color: #f87171 !important; color: white; }
        .nav-btn { transition: all 0.2s ease; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s ease; }
        .quiz-container { max-width: 720px; margin: 0 auto; }
        .section-header { font-size: 0.75rem; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }
        .answer-letter { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; }
        .mobile-friendly { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 mobile-friendly">
    <div class="quiz-container min-h-screen px-4 py-6 flex flex-col">

                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-5 mb-6 text-sm">

                        <div><div class="text-2xl font-bold text-amber-400">100%</div><div class="text-xs text-slate-500 mt-0.5">כיסוי</div></div>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="startQuiz(false)" class="w-full group flex items-center justify-center gap-x-3 bg-white hover:bg-slate-100 active:bg-slate-200 transition-all text-slate-900 font-extrabold py-4 px-8 rounded-3xl text-lg shadow-xl">
                        <span>התחל חידון מלא</span>

                    <button onclick="startQuiz(true)" class="w-full flex items-center justify-center gap-x-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 transition-colors border border-slate-600 font-semibold py-3.5 px-6 rounded-3xl text-base">

        </div>

        <div id="quiz-screen" class="hidden flex-1 flex flex-col">

            <div class="flex gap-3 px-1">

                    <i class="fa-solid fa-home"></i><span>חזור למסך הפתיחה</span>
                </button>
            </div>
        </div>
    </div>

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let userAnswers = [];
        let isAnswered = false;
        
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        function startQuiz(randomMode = false) {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            if (randomMode) {
                currentQuestions = shuffleArray(allQuestions).slice(0, 50);
            } else {
                currentQuestions = [...allQuestions];
            }
            currentIndex = 0;
            score = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            isAnswered = false;
            updateHeader();
            showQuestion();
        }
        
        function updateHeader() {
            document.getElementById('total-q-top').innerText = currentQuestions.length;
            document.getElementById('score-top').innerText = `${score}/${currentQuestions.length}`;
        }
        
        function updateProgress() {
            const progressPercent = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            document.getElementById('q-number-top').innerText = String(currentIndex + 1).padStart(2, '0');
            document.getElementById('score-top').innerText = `${score}/${currentQuestions.length}`;
            document.getElementById('q-badge').innerText = String(currentIndex + 1).padStart(2, '0');
        }
        
        function showQuestion() {
            const q = currentQuestions[currentIndex];
            isAnswered = false;
            document.getElementById('question-text').innerHTML = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((optionText, index) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full text-right p-4 pr-5 rounded-2xl border border-slate-600 bg-slate-800 hover:bg-slate-700 text-[15px] leading-snug font-medium flex items-start gap-3 active:scale-[0.985]`;
                const letter = String.fromCharCode(1488 + index);
                btn.innerHTML = `<span class="answer-letter shrink-0 w-6 h-6 flex items-center justify-center bg-slate-700 text-cyan-400 rounded-xl text-xs font-extrabold mt-0.5">${letter}</span><span class="flex-1 pt-0.5">${optionText}</span>`;
                btn.onclick = () => handleAnswerSelection(index, btn);
                container.appendChild(btn);
            });
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            const nextBtn = document.getElementById('next-btn');
            const nextText = document.getElementById('next-btn-text');
            if (currentIndex === currentQuestions.length - 1) {
                nextText.innerText = 'סיים חידון';
                nextBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-700', 'text-white');
                nextBtn.classList.remove('bg-white', 'text-slate-900');
            } else {
                nextText.innerText = 'הבא';
                nextBtn.classList.remove('bg-emerald-600', 'hover:bg-emerald-700', 'text-white');
                nextBtn.classList.add('bg-white', 'text-slate-900');
            }
            updateProgress();
        }
        
        function handleAnswerSelection(selectedIndex, selectedBtn) {
            if (isAnswered) return;
            isAnswered = true;
            const q = currentQuestions[currentIndex];
            const isCorrect = selectedIndex === q.correct;
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.correct) {
                    btn.classList.add('correct');
                    btn.innerHTML = btn.innerHTML.replace('bg-slate-700', 'bg-emerald-600');
                    btn.innerHTML = btn.innerHTML.replace('text-cyan-400', 'text-white');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('incorrect');
                }
            });
            if (isCorrect) {
                score++;
                document.getElementById('score-top').innerText = `${score}/${currentQuestions.length}`;
            }
            userAnswers[currentIndex] = selectedIndex;
            showFeedback(isCorrect, q.options[q.correct]);
        }
        
        function showFeedback(isCorrect, correctAnswerText) {
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackText = document.getElementById('feedback-text');
            const feedbackIcon = document.getElementById('feedback-icon');
            feedbackArea.classList.remove('hidden');
            if (isCorrect) {
                feedbackBox.className = 'rounded-2xl px-5 py-3.5 text-sm border flex items-start gap-3 bg-emerald-950 border-emerald-800 text-emerald-300';
                feedbackIcon.className = 'fa-solid fa-check-circle text-emerald-400 text-xl mt-0.5';
                feedbackText.innerHTML = '<strong>תשובה נכונה!</strong> כל הכבוד, המשך כך!';
            } else {
                feedbackBox.className = 'rounded-2xl px-5 py-3.5 text-sm border flex items-start gap-3 bg-red-950 border-red-800 text-red-300';
                feedbackIcon.className = 'fa-solid fa-times-circle text-red-400 text-xl mt-0.5';
                feedbackText.innerHTML = `<strong>תשובה שגויה.</strong> התשובה הנכונה: <span class="font-semibold">${correctAnswerText}</span>`;
            }
        }
        
        function nextQuestion() {
            if (!isAnswered && currentIndex < currentQuestions.length - 1) {
                userAnswers[currentIndex] = null;
            }
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                endQuiz();
            }
        }
        
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
                if (userAnswers[currentIndex] !== null) {
                    const q = currentQuestions[currentIndex];
                    const selected = userAnswers[currentIndex];
                    const isCorrect = selected === q.correct;
                    setTimeout(() => {
                        const allBtns = document.getElementById('options-container').querySelectorAll('button');
                        allBtns.forEach((btn, idx) => {
                            btn.disabled = true;
                            if (idx === q.correct) btn.classList.add('correct');
                            else if (idx === selected && !isCorrect) btn.classList.add('incorrect');
                        });
                        showFeedback(isCorrect, q.options[q.correct]);
                    }, 50);
                }
            }
        }
        
        function endQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            const percentage = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('final-percentage').innerText = `${percentage}%`;
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-total').innerText = currentQuestions.length;
            let perfText = '';
            let badgeClass = '';
            if (percentage >= 90) {
                perfText = 'ביצוע מצוין! אתה שולט בחומר באופן מלא 🏆';
                badgeClass = 'bg-emerald-900 border-emerald-700 text-emerald-300';
            } else if (percentage >= 75) {
                perfText = 'ביצוע טוב מאוד! יש לך בסיס חזק מאוד.';
                badgeClass = 'bg-teal-900 border-teal-700 text-teal-300';
            } else if (percentage >= 60) {
                perfText = 'ביצוע סביר. מומלץ לחזור על הנושאים החלשים.';
                badgeClass = 'bg-amber-900 border-amber-700 text-amber-300';
            } else {
                perfText = 'כדאי לחזור על הסיכום ולנסות שוב. אתה יכול להצליח!';
                badgeClass = 'bg-red-900 border-red-700 text-red-300';
            }
            const badge = document.getElementById('performance-badge');
            badge.className = `inline-flex items-center gap-x-2 rounded-3xl px-5 py-2 mb-8 ${badgeClass}`;
            document.getElementById('performance-text').innerText = perfText;
        }
        
        function restartQuiz() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '0%';
        }
        
        function goToStart() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
        
        function reviewWrongAnswers() {
            const wrongOnes = [];
            for (let i = 0; i < currentQuestions.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] !== currentQuestions[i].correct) {
                    wrongOnes.push({
                        num: i + 1,
                        question: currentQuestions[i].question,
                        yourAnswer: currentQuestions[i].options[userAnswers[i]],
                        correctAnswer: currentQuestions[i].options[currentQuestions[i].correct]
                    });
                }
            }
            if (wrongOnes.length === 0) {
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl flex items-center gap-x-2 z-50';
                toast.innerHTML = `<i class="fa-solid fa-check-double"></i> <span>כל התשובות היו נכונות! כל הכבוד!</span>`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2800);
                return;
            }
            let modalHTML = `
                <div class="fixed inset-0 bg-black/80 flex items-end sm:items-center justify-center p-4 z-[100]" onclick="this.remove()">
                    <div onclick="event.stopImmediatePropagation()" class="bg-slate-900 w-full max-w-2xl max-h-[85vh] overflow-auto rounded-t-3xl sm:rounded-3xl border border-slate-700 p-5 sm:p-6">
                        <div class="flex items-center justify-between mb-5 sticky top-0 bg-slate-900 py-2">
                            <div>
                                <h3 class="text-xl font-extrabold">סקירת תשובות שגויות</h3>
                                <p class="text-xs text-slate-400">${wrongOnes.length} שאלות שגויות מתוך ${currentQuestions.length}</p>
                            </div>
                            <button onclick="this.closest('.fixed').remove()" class="text-3xl leading-none text-slate-400 hover:text-white px-3">×</button>
                        </div>
                        <div class="space-y-4 pb-4">
            `;
            wrongOnes.forEach(item => {
                modalHTML += `
                    <div class="border border-red-900/60 bg-red-950/30 rounded-2xl p-4 text-sm">
                        <div class="flex items-center gap-x-2 mb-2">
                            <span class="font-mono text-xs bg-red-900/60 text-red-300 px-2.5 py-px rounded">שאלה ${item.num}</span>
                        </div>
                        <div class="font-medium mb-3 leading-snug">${item.question}</div>
                        <div class="space-y-1.5 text-xs">
                            <div class="flex gap-2">
                                <span class="text-red-400 shrink-0">✗ התשובה שלך:</span> 
                                <span class="text-red-200">${item.yourAnswer}</span>
                            </div>
                            <div class="flex gap-2">
                                <span class="text-emerald-400 shrink-0">✓ התשובה הנכונה:</span> 
                                <span class="text-emerald-200 font-medium">${item.correctAnswer}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            modalHTML += `
                        </div>
                        <div class="pt-3 border-t border-slate-700 flex justify-end">
                            <button onclick="this.closest('.fixed').remove()" class="px-6 py-2 text-sm font-semibold bg-slate-700 hover:bg-slate-600 rounded-2xl">סגור</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }
        
        function setupKeyboardSupport() {
            document.addEventListener('keydown', function(e) {
                const quizScreen = document.getElementById('quiz-screen');
                if (quizScreen.classList.contains('hidden')) return;
                if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    if (e.key === 'ArrowRight') document.getElementById('next-btn').click();
                    else document.getElementById('prev-btn').click();
                }
                if (!isAnswered && ['1','2','3','4'].includes(e.key)) {
                    const idx = parseInt(e.key) - 1;
                    const options = document.getElementById('options-container').querySelectorAll('button');
                    if (options[idx]) options[idx].click();
                }
            });
            console.log('%c[Cyber Quiz] Keyboard support enabled (arrows + 1-4 keys)', 'color:#475569');
        }
        
        function initializeQuiz() {
            initTailwind();
            setupKeyboardSupport();
            document.getElementById('progress-bar').style.width = '0%';
            console.log('%c[Cyber Quiz] חידון מוכן! כל האפשרויות מאוזנות באורך.', 'color:#64748b; font-size: 9px');
        }
        
        window.onload = initializeQuiz;
    </script>
